<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Login – MeetMind</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-body">
<div id="toast-container"></div>

<div class="auth-container fade-in">
  <div class="auth-logo">
    <div class="logo-icon" style="font-size:28px;margin-bottom:8px">🎙️</div>
    <h1 class="auth-title">MeetMind</h1>
    <p class="auth-subtitle">AI-powered meeting notes</p>
  </div>

  <div class="auth-card">
    <h2 style="font-size:20px;margin-bottom:20px;text-align:center">Welcome back</h2>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center" id="submit-btn">
        Sign in
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button class="btn btn-secondary btn-lg" style="width:100%;justify-content:center" onclick="fillDemo()">
      🚀 Try Demo Account
    </button>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary)">
      Don't have an account? <a href="/register" style="color:var(--accent-bright)">Sign up</a>
    </p>
  </div>
</div>

<script src="{{ url_for('static', filename='js/helpers.js') }}"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  function fillDemo() {
    document.getElementById('email').value    = 'demo@meetmind.ai';
    document.getElementById('password').value = 'demo123';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const data = await api.post('/auth/login', {
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      localStorage.setItem('token', data.token);
      window.location.href = '/dashboard';
    } catch (err) {
      showToast(err.message || 'Login failed', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
