<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Register – MeetMind</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-body">
<div id="toast-container"></div>

<div class="auth-container fade-in">
  <div class="auth-logo">
    <div class="logo-icon" style="font-size:28px;margin-bottom:8px">🎙️</div>
    <h1 class="auth-title">MeetMind</h1>
    <p class="auth-subtitle">Create your account</p>
  </div>

  <div class="auth-card">
    <h2 style="font-size:20px;margin-bottom:20px;text-align:center">Get started</h2>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="name" placeholder="Jane Smith" required minlength="2" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center" id="submit-btn">
        Create account
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary)">
      Already have an account? <a href="/login" style="color:var(--accent-bright)">Sign in</a>
    </p>
  </div>
</div>

<script src="{{ url_for('static', filename='js/helpers.js') }}"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const data = await api.post('/auth/register', {
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      localStorage.setItem('token', data.token);
      window.location.href = '/dashboard';
    } catch (err) {
      showToast(err.message || 'Registration failed', 'error');
      btn.disabled = false; btn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
