<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Shared Meeting – MeetMind</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body style="background:var(--bg-primary);min-height:100vh;padding:0">
<div id="toast-container"></div>

<div style="max-width:820px;margin:0 auto;padding:24px 16px" class="fade-in" id="shared-root">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <div class="spinner spinner-lg"></div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/helpers.js') }}"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
const TOKEN = '{{ token }}';
const SPEAKER_COLORS = ['var(--accent-bright)','var(--teal)','var(--amber)','var(--green)'];

(async () => {
  try {
    const data = await api.get('/meetings/shared/' + TOKEN, true);
    const m    = data.meeting;
    const s    = m.summary || {};
    const segs = (m.transcript||{}).segments || [];

    document.getElementById('shared-root').innerHTML = `
      <!-- Public header -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div class="logo-icon" style="font-size:22px">🎙️</div>
        <span style="font-size:18px;font-weight:700;color:var(--text-primary)">MeetMind</span>
        <span class="badge badge-muted" style="margin-left:auto">🔗 Shared</span>
      </div>

      <h1 style="font-size:26px;margin-bottom:8px">${escHtml(m.title)}</h1>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:28px;display:flex;gap:16px;flex-wrap:wrap">
        <span>📅 ${formatDate(m.createdAt)}</span>
        ${m.duration>0 ? `<span>🕒 ${formatDuration(m.duration)}</span>` : ''}
        ${m.wordCount>0 ? `<span>📝 ${m.wordCount} words</span>` : ''}
      </div>

      ${s.overview ? `<div class="card" style="margin-bottom:20px">
        <h2 style="font-size:16px;margin-bottom:12px">📝 Summary</h2>
        <p style="font-size:14px;line-height:1.8;color:var(--text-secondary)">${escHtml(s.overview)}</p>
      </div>` : ''}

      ${s.keyPoints?.length ? `<div class="card" style="margin-bottom:20px">
        <h2 style="font-size:16px;margin-bottom:12px">💡 Key Points</h2>
        ${s.keyPoints.map(p=>`<div class="key-point"><div class="key-point-bullet"></div><span class="key-point-text">${escHtml(p)}</span></div>`).join('')}
      </div>` : ''}

      ${(m.actionItems||[]).length ? `<div class="card" style="margin-bottom:20px">
        <h2 style="font-size:16px;margin-bottom:12px">✅ Action Items</h2>
        ${m.actionItems.map(item=>`<div class="action-item ${item.completed?'completed':''}">
          <span style="font-size:16px">${item.completed?'☑':'☐'}</span>
          <div style="flex:1"><div class="action-text">${escHtml(item.task)}</div>
            <div class="action-meta">
              <span class="badge ${item.priority==='high'?'priority-high':item.priority==='low'?'priority-low':'priority-medium'}">${item.priority||'medium'}</span>
              ${item.assignee ? `<span style="font-size:12px;color:var(--text-muted)">👤 ${escHtml(item.assignee)}</span>` : ''}
            </div>
          </div>
        </div>`).join('')}
      </div>` : ''}

      ${segs.length ? `<div class="card" style="margin-bottom:20px">
        <h2 style="font-size:16px;margin-bottom:16px">📄 Transcript</h2>
        ${segs.map((seg,i)=>{
          const idx = parseInt((seg.speaker||'1').replace(/\D/g,'')||'1')-1;
          const color = SPEAKER_COLORS[idx%4];
          return `<div class="transcript-segment">
            <div class="speaker-label" style="color:${color};border-color:${color}">${escHtml(seg.speaker||'Speaker')}</div>
            <div class="transcript-text">${escHtml(seg.text||'')}</div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <div style="text-align:center;padding:24px 0;border-top:1px solid var(--border);color:var(--text-muted);font-size:13px">
        Shared via <a href="/login" style="color:var(--accent-bright)">MeetMind</a> – AI-powered meeting notes
      </div>`;
  } catch {
    document.getElementById('shared-root').innerHTML = `
      <div class="empty-state" style="padding:80px 20px">
        <div style="font-size:48px;margin-bottom:16px">🔒</div>
        <h2>Meeting not found</h2>
        <p>This link may have expired or been removed.</p>
        <a href="/login" class="btn btn-primary" style="margin-top:16px">Go to MeetMind</a>
      </div>`;
  }
})();
</script>
</body>
</html>
